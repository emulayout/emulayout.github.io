name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache cmini repo + layout timestamps
        uses: actions/cache@v4
        with:
          path: |
            .cache/cmini-repo
            .cache/layout-timestamps.json
            .cache/layout-stats-monkeyracer.json
          key: ${{ runner.os }}-cmini-v4-${{ hashFiles('bin/cmini-sync.js', 'bin/layout-codec.js', 'bin/layout-transformer.js', 'bin/layout-timestamps.js', 'bin/layout-stats.js', 'bin/layout-stats-cache.js', 'bin/cmini-analyzer.js', 'bin/cmini-data/**', 'bin/cyanophage-stats.js', 'bin/cyanophage-data/**', 'src/lib/layoutDisplay.ts', 'src/lib/cyanophage.ts') }}
          restore-keys: |
            ${{ runner.os }}-cmini-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run cmini-sync
        run: bun run ./bin/cmini-sync.js
        env:
          CI: true

      - name: Verify monkeyracer stats match cmini cache
        run: bun run verify:monkeyracer-stats

      - name: Build
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
